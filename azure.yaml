name: copilot-sd-otel-foundry-rag-demo
metadata:
  template: copilot-sd-otel-foundry-rag-demo@0.1.0

infra:
  provider: bicep
  path: infra

services:
  api:
    project: .
    host: containerapp
    language: ts
    docker:
      path: Dockerfile
      context: .

hooks:
  preprovision:
    shell: pwsh
    run: node ./scripts/get-github-token.mjs
    interactive: true
    continueOnError: true
  prerun:
    shell: pwsh
    run: node ./scripts/get-github-token.mjs
    interactive: true
    continueOnError: true

